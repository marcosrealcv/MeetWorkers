<div class="grid grid-cols-2 gap-8 h-screen">
    <div class="flex flex-col items-center justify-center border-r-2 border-gray-300 pr-8">
        <h2 class="text-5xl font-bold text-center">Registrar un usuario</h2>
    </div>
    <div class="flex flex-col items-center justify-center pl-8">
        <form action="" class="w-full max-w-md">
            <div class="mb-4">
                <label for="nombre" class="block text-sm font-medium mb-1">Nombre de tu empresa</label>
                <input type="text" id="nombre" name="nombre" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
             <div class="mb-4">
                <label for="nombre" class="block text-sm font-medium mb-1">email</label>
                <input type="email" id="nombre" name="nombre" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-4">
                <label for="nombre" class="block text-sm font-medium mb-1">contraseña</label>
                <input type="password" id="nombre" name="nombre" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-4">

</div>
