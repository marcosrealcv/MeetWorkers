<div class="container mx-auto py-12 px-4">
    @if (servicio()) {
        <div class="mb-8">
            <h1 class="text-4xl font-bold text-gray-900 mb-2">{{ servicio()!.nombre }}</h1>
            <p class="text-gray-600 text-lg">Selecciona un proveedor para contratar:</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            @for (proveedor of proveedores(); track proveedor.id) {
                <app-tarjeta-proveedor [proveedor]="proveedor"></app-tarjeta-proveedor>
            }
        </div>
    } @else {
        <div class="text-center py-12">
            <p class="text-xl text-gray-600">Servicio no encontrado</p>
        </div>
    }
</div>
