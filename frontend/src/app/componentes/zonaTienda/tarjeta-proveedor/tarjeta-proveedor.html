<div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100 hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1">
    <div class="relative h-40 w-full">
        <img [src]="proveedor.imagen" alt="proveedor" class="w-full h-full object-cover">
        @if (proveedor.resenas > 0) {
            <div class="absolute top-2 right-2 bg-white px-2 py-1 rounded-lg shadow text-sm font-bold text-[#5F818C]">
                {{ proveedor.rating }}★
            </div>
        } @else {
            <div class="absolute top-2 right-2 bg-white px-2 py-1 rounded-lg shadow text-sm font-bold text-gray-500">
                Sin puntuacion
            </div>
        }
    </div>
    <div class="p-5">
        <h3 class="text-lg font-bold text-gray-800 mb-1">{{ proveedor.nombre }}</h3>
        <p class="text-[#5F818C] text-sm font-semibold mb-2">{{ proveedor.especialidad }}</p>
        <p class="text-gray-600 text-xs mb-3">{{ proveedor.experiencia }}</p>
        
        <div class="flex items-center justify-between mb-4 text-sm text-gray-600">
            <span>{{ proveedor.resenas }} reseñas</span>
            <span class="font-bold text-lg text-[#5F818C]">{{ proveedor.precio }}</span>
        </div>

        <button (click)="contratarProveedor()" class="w-full py-2.5 bg-[#5F818C] text-white rounded-lg font-semibold hover:bg-[#4d6972] transition-colors">
            Contratar
        </button>
    </div>
</div>
